<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | HomeIQ</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-body">
  <button id="authThemeToggle" class="theme-btn auth-theme-btn">🌙 Dark</button>
  <main class="auth-page">
    <section class="auth-visual">
      <div class="brand auth-brand"><div class="brand-icon">⌂</div><div><h2>HomeIQ</h2><span>Smart Home Control</span></div></div>
      <h1>Create a new secure password.</h1>
      <p>Your old password will be replaced after the reset token is verified by the backend.</p>
      <div class="auth-stats">
        <div><strong>Token</strong><span>Verified</span></div>
        <div><strong>PBKDF2</strong><span>Hashed password</span></div>
        <div><strong>Login</strong><span>After reset</span></div>
      </div>
    </section>
    <section class="auth-card">
      <p class="eyebrow">New Password</p>
      <h2>Reset Password</h2>
      <p class="auth-subtitle">Enter a new password for your account.</p>
      <form id="resetPasswordForm" class="auth-form">
        <input type="hidden" name="token" id="resetToken" />
        <label>New password<input type="password" name="password" placeholder="Minimum 6 characters" required minlength="6" /></label>
        <label>Confirm password<input type="password" name="confirmPassword" placeholder="Re-enter password" required minlength="6" /></label>
        <button type="submit">Reset Password</button>
      </form>
      <p id="authMessage" class="auth-message"></p>
      <p class="auth-switch">Back to <a href="/login.html">Login</a></p>
    </section>
  </main>
  <script src="/js/auth.js"></script>
</body>
</html>
